# HTTP → HTTPS redirect
server {
    listen 80;
    server_name super-stam.teletop.biz;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name super-stam.teletop.biz;

    ssl_certificate     /etc/letsencrypt/live/super-stam.teletop.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/super-stam.teletop.biz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # API → Express server on port 4003
    location /api/ {
        proxy_pass         http://localhost:4003;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Uploaded images → Express server on port 4003
    location /uploads/ {
        proxy_pass http://localhost:4003;
        proxy_set_header Host $host;
    }

    # React SPA — served directly by nginx (no PM2 needed for client)
    root  /root/NewPro/super-stam/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
