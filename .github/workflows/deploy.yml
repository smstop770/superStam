name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to 38.242.215.142
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Connect & Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            export PATH="$PATH:/usr/local/bin"

            echo "── Ensure global tools ───────────────────"
            npm list -g serve --depth=0 2>/dev/null || npm install -g serve

            echo "── Pull latest code ──────────────────────"
            cd /root/NewPro/super-stam
            git pull origin main

            echo "── Install & build server ────────────────"
            cd server
            npm install
            npm rebuild
            npm run build

            echo "── Install & build client ────────────────"
            cd ../client
            npm install
            npm run build

            echo "── Restart PM2 ───────────────────────────"
            cd ..
            pm2 restart ecosystem.config.js --update-env 2>/dev/null || pm2 start ecosystem.config.js
            pm2 save

            echo "✅ Deploy finished! good baybe 👋"
